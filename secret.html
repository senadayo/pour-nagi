<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pour Nagi — Secret</title>
  <meta name="description" content="クイズ→ゲーム→メッセージ" />
  <link rel="stylesheet" href="assets/style.css" />
  <script defer src="assets/app.js"></script>
</head>
<body>
  <div class="container">
    <nav class="nav">
      <div class="brand">
        <div class="logo">Pour Nagi</div>
        <div class="tag">Secret</div>
      </div>
      <div class="links">
        <a class="pill" data-nav href="index.html">Top</a>
        <a class="pill" data-nav href="menu.html">Menu</a>
        <a class="pill" data-nav href="chef.html">Chef</a>
        <a class="pill" data-nav href="secret.html">Secret</a>
        <a class="pill" data-nav href="game.html">Game</a>
      </div>
    </nav>

    <section class="section center" data-secret-root>
      <div class="kicker">Secret Page</div>
      <h1 class="h1">BIRTHDAY MESSAGE</h1>
      <hr class="rule" />
  

      <!-- クイズ表示領域 -->
      <div class="qbox"></div>
      <div class="toast" data-toast></div>

      <!-- クイズだけクリア後のゲート -->
      <div class="section" data-gate style="display:none;">
        <div class="kicker">Next</div>
        <div class="jp">クイズはクリア！</div>
        <p class="sub">次はミニゲームをクリアしてね。</p>
        <div class="btnrow">
          <a class="btn" href="game.html">ゲームへ進む</a>
        </div>
        <p class="small center">（ゲームクリア後、このページに戻るとメッセージが表示されます）</p>
      </div>

      <!-- メッセージ -->
      <pre data-message style="
        display:none;
        white-space:pre-wrap;
        margin:18px auto 0;
        max-width:720px;
        text-align:left;
        font-size:16px;
        line-height:1.9;
        color:var(--ink);
        font-family: inherit;"></pre>
    </section>
  </div>
</body>
</html>

      <div class="kicker">Chef de cuisine</div>
      <h1 class="h1">清水 稜也</h1>
      <hr class="rule" />
      <p class="sub">
        群馬県出身。現役大学生。料理歴3年。<br>
        「うまい」はもちろん、「食べたあとに気持ちが残る」料理を目指します。<br>
        得意料理は豆腐ごはん。生ネギはもう入れません。
      </p>
    </section>

    <div class="grid">
      <div class="card">
        <h3>出身</h3>
        <p>群馬。空気がうまい。水もうまい。だから料理も伸びる</p>
      </div>
      <div class="card">
        <h3>学び</h3>
        <p>大学で料理について日々研究している。</p>
      </div>
      <div class="card">
        <h3>料理歴</h3>
        <p>3年。カンだけで作らず、温度と時間を信じる派。</p>
      </div>
      <div class="card">
        <h3>得意料理</h3>
        <p>豆腐ごはん。トラウマ</p>
      </div>
    </div>

    <section class="section center">
      <div class="kicker">Message</div>
      <p class="sub">
        今日は <b>なぎちゃんが主役</b>。<br>
        食べるペースも、好きな順番も、ぜんぶ自由。楽しくいこう。
